<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <title>Tic Tac Toe</title>
  </head>
  <body class="container">
    <main>
      <section id="main-menu-section" class="d-flex-col-c-c">
        <h2>Tic Tac Toe</h2>
        <form class="d-flex-col-c-c" id="main-menu-form">
          <fieldset class="d-flex-col-c-c">
            <div class="player-input">
              <label for="player-one-name">X Player: </label>
              <input
                type="text"
                placeholder="Enter player name"
                id="player-one-name"
                name="player-one"
                maxlength="18"
                required
              />
            </div>
            <div class="player-input">
              <label for="player-two-name">Y Player: </label>
              <input
                type="text"
                placeholder="Enter player name"
                id="player-two-name"
                name="player-two"
                maxlength="18"
                required
              />
            </div>
          </fieldset>
          <div>
            <button type="submit">Start Game</button>
          </div>
        </form>
      </section>
      <section id="gameboard-section" class="hidden">
        <div id="game-board"></div>
      </section>
    </main>
    <script src="/module/Display-Controller.js" type="module"></script>
  </body>
</html>
